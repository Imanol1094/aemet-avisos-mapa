name: Captura diaria AEMET

on:
  # Permite ejecutar manualmente el workflow para hacer pruebas.
  workflow_dispatch:

  # Lo ejecuta cada día entre mayo y septiembre a las 08:30,
  # utilizando la hora peninsular española.
  schedule:
    - cron: '30 9 * 5-9 *'
      timezone: 'Europe/Madrid'

permissions:
  contents: write

jobs:
  captura:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Playwright
        run: npm install playwright

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Capturar mapa AEMET
        run: node capture-aemet.js

      - name: Guardar imágenes en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Actualiza mapa diario de AEMET"
          git push
