name: Captura diaria AEMET

on:
  # Permite ejecutar el proceso manualmente desde la pestaña Actions.
  workflow_dispatch:

  # Ejecuciones automáticas diarias entre mayo y septiembre.
  schedule:
    # Primer intento diario a las 09:00, hora de Madrid.
    - cron: '0 9 * 5-9 *'
      timezone: 'Europe/Madrid'

    # Segundo intento diario a las 10:00, hora de Madrid.
    - cron: '0 10 * 5-9 *'
      timezone: 'Europe/Madrid'

    # PRUEBA TEMPORAL:
    # Se ejecutará hoy a las 10:55, hora de Madrid.
    # Elimina este bloque cuando confirmemos que funciona.
    - cron: '45 10 * 5-9 *'
      timezone: 'Europe/Madrid'

# Permite que el workflow guarde las imágenes generadas
# dentro del propio repositorio.
permissions:
  contents: write

# Evita que dos ejecuciones intenten modificar los archivos
# al mismo tiempo.
concurrency:
  group: captura-diaria-aemet
  cancel-in-progress: false

jobs:
  captura:
    name: Generar captura de AEMET
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Playwright
        run: npm install --no-save playwright

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Ejecutar captura de AEMET
        run: node capture-aemet.js

      - name: Comprobar que se ha generado la imagen
        run: |
          if [ ! -f "docs/aemet-manana.png" ]; then
            echo "ERROR: No se ha generado docs/aemet-manana.png"
            exit 1
          fi

      - name: Guardar las imágenes en el repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/

          if git diff --cached --quiet; then
            echo "La captura no contiene cambios que guardar."
          else
            git commit -m "Actualiza mapa diario de AEMET"
            git push
          fi
